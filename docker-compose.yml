services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aisre
      POSTGRES_PASSWORD: aisre
      POSTGRES_DB: aisre
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisre -d aisre"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
